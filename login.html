<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@500&family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./asserts/css/reset.css">
    <link rel="stylesheet" href="./asserts/css/cores.css">
    <link rel="stylesheet" href="./asserts/css/texto.css">
    <link rel="stylesheet" href="./asserts/css/fontes.css">
    <link rel="stylesheet" href="./asserts/css/rodape.css">
    <link rel="stylesheet" href="./asserts/css/login-360px.css">
    <link rel="stylesheet" href="./asserts/css/login-768px.css">
    <link rel="stylesheet" href="./asserts/css/header.css">
    <title>Adopet</title>
  </head>
  <body>
    <header class="cabecalho">
      <img class="cabecalho__imgpatas-right" src="./asserts/img/cadastro/Patas.svg" alt="">

      <div class="cabecalhoContainer__icon">
        <img class="logo__icon" src="./asserts/img/login/Logo.svg" alt="">
        <a href="index.html"><img src="./asserts/img/icons/Casa.svg" alt="Icone de home ou tela principal"></a>
        <a href="mensagem.html"><img src="./asserts/img/icons/Mensagens.svg" alt="Icone de mensagem"></a>
      </div>

      <div class="cabecalhoContainer__logo">
        <img src="./asserts/img/cadastro/Logo.svg" alt="">
      </div>
    </header>

    <main class="container">
      <p class="texto-azul">Já tem conta? Faça seu login:</p>

        <label class="texto__campo titulo__campo" for="email">Email
          <input class="campo" type="email" id="email" placeholder="Escolha seu melhor e-mail">
        </label>

        <label class="texto__campo titulo__campo" for="senha">Senha
          <img class="campo__icon" src="./asserts/img/cadastro/Vector.svg" alt="icone para exibir a senha">
          <input class="campo" type="password" id="senha" placeholder="Crie uma senha">
          
        </label>

        <a class="botao titulo__botao" href="home.html">Entrar</a>
    </main>

    <footer class="rodape">
      <p class="texto">2022 - Desenvolvido por Alura.</p>
    </footer>
  </body>
</html>
