<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@500&family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./asserts/css/reset.css" />
    <link rel="stylesheet" href="./asserts/css/cores.css" />
    <link rel="stylesheet" href="./asserts/css/texto.css" />
    <link rel="stylesheet" href="./asserts/css/fontes.css" />
    <link rel="stylesheet" href="./asserts/css/rodape.css">
    <link rel="stylesheet" href="./asserts/css/perfil.css" />
    <title>Adopet</title>
  </head>
  <body>
    <header class="cabecalho">
      <div class="cabecalhoContainer__icon">
        <div class="container__navigations">
          <a href="index.html"
            ><img
              class="icon"
              src="./asserts/img/icons/Casa.svg"
              alt="Icone de home ou tela principal"
          /></a>
          <a href="mensagem.html"
            ><img
              src="./asserts/img/icons/Mensagens.svg"
              alt="Icone de mensagem"
          /></a>
        </div>

        <a href="perfil.html"><img class="perfil__img" src="./asserts/img/icons/Usuário.svg" alt="Icone de mensagem"></a>
      </div>

      <p class="texto-azul">
        Esse é o perfil que aparece para responsáveis ou ONGs que recebem sua mensagem.
      </p>
    </header>

    <main class="container">
      <div class="card">
        <h1 class="titulo__card--cinza" >Perfil</h1>

        <label class="texto-azul--600 titulo__campo" for="nome">Foto</label>
        <img class="card__imgperfil" src="./asserts/img/perfil/Ellipse 2.svg" alt="">
        <a class="texto-vermelho" href="#"><p>Clique na foto para editar</p></a>

        <div>
          <label class="texto-azul--600 titulo__campo" for="nome">Nome</label>
          <input
            class="campo texto__campo--size14px"
            type="text"
            id="nome"
            value="Joana Magalhães"
            placeholder="Insira seu nome completo"
          />
        </div>

        <div>
          <label class="texto-azul--600 titulo__campo" for="telefone"
            >Telefone</label
          >
          <input
            class="campo texto__campo--size14px"
            type="text"
            id="telefone"
            value="55 11 XXXXXXXXX"
            placeholder="Insira seu telefone e/ou whatsapp"
          />
        </div>

        <div>
          <label class="texto-azul--600 titulo__campo" for="nomeanimal"
            >Cidade</label
          >
          <input
            class="campo texto__campo--size14px"
            type="text"
            id="nomeanimal"
            value="São Paulo"
            placeholder="Por qual animal você se interessou?"
          />
        </div>

        <div class="mensagem">
          <label class="texto-azul--600 titulo__area" for="mensagem"
            >Sobre</label
          >
          <textarea
            class="campo__area texto__campo--size14px"
            type="text"
            id="mensagem"
            placeholder="Escreva sua mensagem."
            
          >At vero eos et accusamus et iusto odio dignissimos ducimus qui blanditiis praesentium voluptatum deleniti atque corrupti quos dolores et quas molestias excepturi sint occaecati.</textarea>
          <a href="login.html" class="botao titulo__botao">Cadastrar</a>
        </div>

        
      </div>
    </main>

    <footer class="rodape">
      <p class="texto">2022 - Desenvolvido por Alura.</p>
    </footer>
  </body>
</html>
