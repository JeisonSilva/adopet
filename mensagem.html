<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@500&family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./asserts/css/reset.css">
    <link rel="stylesheet" href="./asserts/css/cores.css">
    <link rel="stylesheet" href="./asserts/css/texto.css">
    <link rel="stylesheet" href="./asserts/css/fontes.css">
    <link rel="stylesheet" href="./asserts/css/mensagem.css">
    <title>Adopet</title>
  </head>
  <body>
    <header class="cabecalho">

      <div class="cabecalhoContainer__icon">
       <div class="container__navigations">
            <a href="index.html"><img class="icon" src="./asserts/img/icons/Casa.svg" alt="Icone de home ou tela principal"></a>
            <a href="mensagem.html"><img src="./asserts/img/icons/Mensagens.svg" alt="Icone de mensagem"></a>
       </div>
        <img class="perfil__img" src="./asserts/img/icons/Usuário.svg" alt="Icone de mensagem">
      </div>

      
      <p class="texto-azul">Envie uma mensagem para a pessoa ou instituição que está cuidando do animal:</p>
    </header>

    <main class="container">
        <div class="card">
            <label class="texto-azul--600 titulo__campo" for="nome">Nome
                <input class="campo" type="text" id="nome" placeholder="Insira seu nome completo">
              </label>

              <label class="texto-azul--600 titulo__campo" for="telefone">Telefone
                <input class="campo" type="text" id="telefone" placeholder="Insira seu telefone e/ou whatsapp">
              </label>

              <label class="texto-azul--600 titulo__campo" for="nomeanimal">Nome do animal
                <input class="campo" type="text" id="nomeanimal" placeholder="Por qual animal você se interessou?">
              </label>

              <label class="texto-azul--600 titulo__area" for="mensagem">Mensagem
                <textarea class="campo__area" type="text" id="mensagem" cols="30" rows="20" placeholder="Escreva sua mensagem."></textarea>
              </label>

              <a href="login.html" class="botao titulo__botao">Cadastrar</a>
        </div>
    </main>

    <footer class="rodape">
      <p class="texto">2022 - Desenvolvido por Alura.</p>
    </footer>
  </body>
</html>
